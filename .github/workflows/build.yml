name: Compilar APK de Kivy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Redireccionar codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias del sistema y Dos2Unix
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libsqlite3-dev dos2unix
        sudo apt-get install -y openjdk-17-jdk unzip zip

    - name: Instalar Buildozer y Cython Mantenidos
      run: |
        pip install --upgrade pip
        pip install buildozer cython virtualenv kivy

    - name: Crear configuracion estricta sin duplicados
      run: |
        rm -f buildozer.spec
        
        cat << 'EOF' > buildozer.spec
        [app]
        title = Calculadora
        package.name = calculadora
        package.domain = org.dennis
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 0.1
        requirements = python3,kivy
        orientation = portrait
        osx.kivy_version = 2.1.0
        fullscreen = 0
        
        # Configuracion de Android corregida para evitar el error 404 de Google
        android.api = 33
        android.minapi = 24
        android.accept_sdk_license = True
        android.skip_update = False
        
        # ARQUITECTURA UNICA
        android.archs = arm64-v8a
        
        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOF

    - name: Limpiar saltos de linea en main.py
      run: |
        dos2unix main.py

    - name: Compilar con Buildozer Minucioso
      run: |
        buildozer android debug
      continue-on-error: false

    - name: Subir APK Generado
      uses: actions/upload-artifact@v4
      with:
        name: Calculadora-APK
        path: bin/*.apk
