name: Compilar APK de Kivy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            build-essential \
            ccache \
            libffi-dev \
            libssl-dev \
            libsqlite3-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            dos2unix

      - name: Instalar Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 Cython==0.29.37 virtualenv

      - name: Corregir saltos de línea
        run: |
          dos2unix main.py

      - name: Compilar APK
        run: |
          buildozer android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Calculadora-APK
          path: bin/*.apk
